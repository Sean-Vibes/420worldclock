<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global 420 - NY Vibes Edition</title>
    <style>
        :root {
            --leaf: #4e9a06;
            --warning: #ff4444;
            --smoke: #f0f0f0;
            --glass: rgba(0, 0, 0, 0.85);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #111; 
            font-family: "Comic Sans MS", "Comic Sans", cursive, sans-serif;
            color: var(--smoke);
        }

        .content-box {
            position: relative;
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 25px;
            border: 6px solid var(--leaf);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            width: 750px;
            height: 420px;
            margin: 20px auto;
            box-sizing: border-box;
            transition: all 0.5s ease;
            overflow: hidden;
        }

        .corner-logo {
            position: absolute;
            bottom: 12px;
            left: 15px;
            width: 70px; 
            height: auto;
            z-index: 20;
            filter: drop-shadow(0 0 5px rgba(78, 154, 6, 0.5));
        }

        .is-warning { border-color: var(--warning) !important; box-shadow: 0 0 35px rgba(255, 68, 68, 0.7); }
        .is-warning #hero-timer { color: var(--warning) !important; animation: fast-pulse 0.5s infinite alternate; }
        @keyframes fast-pulse { from { transform: scale(1); } to { transform: scale(1.05); } }

        .party-mode { animation: party-flicker 0.4s infinite; border-color: #fff !important; }
        @keyframes party-flicker {
            0% { background: rgba(0, 60, 0, 0.9); }
            50% { background: rgba(40, 0, 40, 0.9); }
            100% { background: rgba(0, 0, 60, 0.9); }
        }

        #hero-city { font-size: 2.8rem; margin: 10px 0; text-transform: uppercase; font-weight: 900; color: var(--leaf); letter-spacing: 2px; z-index: 10; position: relative; }
        #hero-timer { font-size: 6rem; font-family: 'Courier New', monospace; margin: 10px 0; color: #fff; font-weight: bold; z-index: 10; position: relative; }
        .label-top { font-size: 1.8rem; letter-spacing: 4px; color: #aaa; text-transform: uppercase; font-weight: bold; z-index: 10; position: relative; }
        .bottom-label { font-size: 1.6rem; color: var(--leaf); margin-top: 5px; font-weight: bold; z-index: 10; position: relative; }

        .smoke-wrap { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 2; }
        .particle { position: absolute; bottom: -20px; background: rgba(255, 255, 255, 0.1); border-radius: 50%; filter: blur(15px); animation: rise 3s infinite ease-out; }
        @keyframes rise { 0% { transform: translateY(0) scale(1); opacity: 0; } 50% { opacity: 0.2; } 100% { transform: translateY(-300px) scale(4); opacity: 0; } }
    </style>
</head>
<body>

    <div class="content-box" id="overlay-container">
        <img src="NYS_420_logo.png" alt="NY 420 Vibes" class="corner-logo">
        <div class="smoke-wrap" id="smoke"></div>
        <span class="label-top" id="label-text">NEXT 4:20 IN:</span>
        <h1 id="hero-city">SYNCING...</h1>
        <div id="hero-timer">00:00</div>
        <div class="bottom-label" id="bottom-label-text">Global Cannabis Clock</div>
    </div>

<script>
    const locations = [
        { name: "Pitcairn Islands", tz: "Pacific/Pitcairn" },
        { name: "Gambier Islands", tz: "Pacific/Gambier" },
        { name: "Marquesas", tz: "Pacific/Marquesas" },
        { name: "Kiritimati", tz: "Pacific/Kiritimati" },
        { name: "Chatham Islands", tz: "Pacific/Chatham" },
        { name: "Anadyr", tz: "Asia/Anadyr" },
        { name: "Lord Howe Island", tz: "Australia/Lord_Howe" },
        { name: "Eucla", tz: "Australia/Eucla" },
        { name: "Adelaide", tz: "Australia/Adelaide" },
        { name: "Darwin", tz: "Australia/Darwin" },
        { name: "Tokyo", tz: "Asia/Tokyo" },
        { name: "Kathmandu", tz: "Asia/Kathmandu" },
        { name: "New Delhi", tz: "Asia/Kolkata" },
        { name: "Kabul", tz: "Asia/Kabul" },
        { name: "Tehran", tz: "Asia/Tehran" },
        { name: "St. John's", tz: "America/St_Johns" },
        { name: "New York", tz: "America/New_York" },
        { name: "Chicago", tz: "America/Chicago" },
        { name: "Denver", tz: "America/Denver" },
        { name: "Phoenix", tz: "America/Phoenix" },
        { name: "Los Angeles", tz: "America/Los_Angeles" },
        { name: "Anchorage", tz: "America/Anchorage" },
        { name: "Honolulu", tz: "Pacific/Honolulu" }
    ];

    let isPartyMode = false;
    let alarmPlayed = false;

    // Load the Halo Sound Effect
    const haloAlarm = new Audio("https://www.myinstants.com/media/sounds/halo-reach-1-minute-remain-33548.mp3");

    function getNext420(tz) {
        const now = new Date();
        const formatter = new Intl.DateTimeFormat('en-US', {
            timeZone: tz, hour12: false, year: 'numeric', month: 'numeric', day: 'numeric', hour: 'numeric', minute: 'numeric', second: 'numeric'
        });
        
        const parts = formatter.formatToParts(now);
        const p = {}; parts.forEach(v => p[v.type] = v.value);
        const localDate = new Date(p.year, p.month - 1, p.day, p.hour, p.minute, p.second);
        
        let targets = [
            new Date(p.year, p.month - 1, p.day, 4, 20, 0),
            new Date(p.year, p.month - 1, p.day, 16, 20, 0),
            new Date(p.year, p.month - 1, p.day, 4, 20, 0)
        ];
        targets[2].setDate(targets[2].getDate() + 1);

        for (let t of targets) {
            let diff = t - localDate;
            if (diff > 0) return diff;
        }
        return 86400000;
    }

    function update() {
        if (isPartyMode) return;
        
        let closest = { diff: Infinity, name: "" };
        locations.forEach(loc => {
            try {
                let diff = getNext420(loc.tz);
                if (diff < closest.diff) closest = { diff: diff, name: loc.name };
            } catch(e) {}
        });

        // ALARM LOGIC: Fire at 60 seconds
        let secondsRemaining = Math.floor(closest.diff / 1000);
        
        if (secondsRemaining === 60 && !alarmPlayed) {
            haloAlarm.play().catch(e => console.log("Audio blocked: Click anywhere on the page to enable sound!"));
            alarmPlayed = true; 
        }

        // Reset alarm tracker once the countdown moves past the trigger point
        if (secondsRemaining < 55 || secondsRemaining > 65) {
            alarmPlayed = false;
        }

        // PARTY MODE TRIGGER
        if (closest.diff <= 1000) { triggerParty(); return; }

        const container = document.getElementById('overlay-container');
        if (closest.diff < 60000) container.classList.add('is-warning');
        else container.classList.remove('is-warning');

        document.getElementById('hero-city').innerText = closest.name;
        
        let sTotal = Math.floor(closest.diff / 1000);
        let h = Math.floor(sTotal / 3600);
        let m = Math.floor((sTotal % 3600) / 60);
        let s = sTotal % 60;
        document.getElementById('hero-timer').innerText = h > 0 ? 
            `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` : 
            `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function triggerParty() {
        isPartyMode = true;
        const container = document.getElementById('overlay-container');
        container.classList.add('party-mode');
        document.getElementById('label-text').innerText = "IT'S 4:20 IN";
        document.getElementById('hero-timer').innerText = "HIGH TIME";
        setTimeout(() => {
            isPartyMode = false;
            container.classList.remove('party-mode');
            document.getElementById('label-text').innerText = "NEXT 4:20 IN:";
            update();
        }, 30000);
    }

    setInterval(update, 1000);
    update();

    // Smoke Particles
    const smokeContainer = document.getElementById('smoke');
    for (let i = 0; i < 15; i++) {
        let p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.width = p.style.height = (Math.random() * 50 + 40) + 'px';
        p.style.animationDelay = (Math.random() * 3) + 's';
        smokeContainer.appendChild(p);
    }
</script>
</body>
</html>
