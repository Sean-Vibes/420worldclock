<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global 420 - Pro Edition</title>
    <style>
        :root {
            --leaf: #4e9a06;
            --warning: #ff4444;
            --smoke: #f0f0f0;
            --glass: rgba(0, 0, 0, 0.85);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: transparent; 
            font-family: "Comic Sans MS", "Comic Sans", cursive, sans-serif;
            color: var(--smoke);
        }

        .content-box {
            position: relative;
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 25px;
            border: 6px solid var(--leaf);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            width: 750px;
            height: 400px;
            margin: 20px auto;
            box-sizing: border-box;
            transition: all 0.5s ease;
            overflow: hidden;
        }

        /* 60s Warning Pulse */
        .is-warning { border-color: var(--warning) !important; box-shadow: 0 0 35px rgba(255, 68, 68, 0.7); }
        .is-warning #hero-timer { color: var(--warning) !important; animation: fast-pulse 0.5s infinite alternate; }
        @keyframes fast-pulse { from { transform: scale(1); } to { transform: scale(1.08); } }

        /* Party Mode Flicker */
        .party-mode { animation: party-flicker 0.4s infinite; border-color: #fff !important; }
        @keyframes party-flicker {
            0% { background: rgba(0, 60, 0, 0.9); }
            50% { background: rgba(40, 0, 40, 0.9); }
            100% { background: rgba(0, 0, 60, 0.9); }
        }

        #hero-city { font-size: 3rem; margin: 10px 0; text-transform: uppercase; font-weight: 900; color: var(--leaf); letter-spacing: 2px; z-index: 10; position: relative; line-height: 1.1; }
        #hero-timer { font-size: 6rem; font-family: 'Courier New', monospace; margin: 10px 0; color: #fff; font-weight: bold; z-index: 10; position: relative; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .label-top { font-size: 1.8rem; letter-spacing: 4px; color: #aaa; text-transform: uppercase; font-weight: bold; z-index: 10; position: relative; }
        .bottom-label { font-size: 1.6rem; color: var(--leaf); margin-top: 10px; font-weight: bold; z-index: 10; position: relative; }

        #fireworks-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; opacity: 0; transition: opacity 0.5s; }
        .party-mode #fireworks-canvas { opacity: 1; }
        
        .smoke-wrap { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 2; }
        .particle { position: absolute; bottom: -20px; background: rgba(255, 255, 255, 0.15); border-radius: 50%; filter: blur(15px); animation: rise 2.5s infinite ease-out; }
        @keyframes rise { 0% { transform: translateY(0) scale(1); opacity: 0; } 100% { transform: translateY(-300px) scale(5); opacity: 0; } }
    </style>
</head>
<body>

    <div class="content-box" id="overlay-container">
        <canvas id="fireworks-canvas"></canvas>
        <div class="smoke-wrap" id="smoke"></div>
        <span class="label-top" id="label-text">NEXT 4:20 IN:</span>
        <h1 id="hero-city">SYNCING...</h1>
        <div id="hero-timer">00:00</div>
        <div class="bottom-label" id="bottom-label-text">Global Cannabis Clock</div>
    </div>

<script>
    // Full Sync with 420worldclock.com time zones
    const locations = [
        { name: "Pitcairn Islands", tz: "Pacific/Pitcairn" },
        { name: "Gambier Islands", tz: "Pacific/Gambier" },
        { name: "Marquesas Islands", tz: "Pacific/Marquesas" },
        { name: "Kiritimati", tz: "Pacific/Kiritimati" },
        { name: "Chatham Islands", tz: "Pacific/Chatham" },
        { name: "Fiji", tz: "Pacific/Fiji" },
        { name: "Norfolk Island", tz: "Pacific/Norfolk" },
        { name: "Sydney / Melbourne", tz: "Australia/Sydney" },
        { name: "Adelaide", tz: "Australia/Adelaide" },
        { name: "Brisbane", tz: "Australia/Brisbane" },
        { name: "Darwin", tz: "Australia/Darwin" },
        { name: "Tokyo / Seoul", tz: "Asia/Tokyo" },
        { name: "Eucla", tz: "Australia/Eucla" },
        { name: "Shanghai / Beijing", tz: "Asia/Shanghai" },
        { name: "Phnom Penh / Bangkok", tz: "Asia/Bangkok" },
        { name: "Yangon", tz: "Asia/Yangon" },
        { name: "Vostok", tz: "Antarctica/Vostok" },
        { name: "Kathmandu", tz: "Asia/Kathmandu" },
        { name: "Colombo / New Delhi", tz: "Asia/Kolkata" },
        { name: "Mawson", tz: "Antarctica/Mawson" },
        { name: "Kabul", tz: "Asia/Kabul" },
        { name: "Dubai", tz: "Asia/Dubai" },
        { name: "Tehran", tz: "Asia/Tehran" },
        { name: "Amman / Moscow", tz: "Asia/Amman" },
        { name: "Cairo / Johannesburg", tz: "Africa/Cairo" },
        { name: "Algiers / London", tz: "Africa/Algiers" },
        { name: "Accra / Reykjavik", tz: "Africa/Accra" },
        { name: "Azores Islands", tz: "Atlantic/Azores" },
        { name: "Noronha", tz: "America/Noronha" },
        { name: "St. John's", tz: "America/St_Johns" },
        { name: "Buenos Aires", tz: "America/Argentina/Buenos_Aires" },
        { name: "Puerto Rico", tz: "America/Puerto_Rico" },
        { name: "New York / Toronto", tz: "America/New_York" },
        { name: "Chicago / Mexico City", tz: "America/Chicago" },
        { name: "Denver / Phoenix", tz: "America/Denver" },
        { name: "Los Angeles / Vancouver", tz: "America/Los_Angeles" },
        { name: "Anchorage", tz: "America/Anchorage" },
        { name: "Honolulu", tz: "Pacific/Honolulu" },
        { name: "American Samoa", tz: "Pacific/Pago_Pago" }
    ];

    // FIREWORKS
    const canvas = document.getElementById('fireworks-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 750; canvas.height = 400;
    let fw_particles = [];
    let isPartyMode = false;

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y; this.color = color;
            this.vel = { x: (Math.random()-0.5)*15, y: (Math.random()-0.5)*15 };
            this.alpha = 1; this.friction = 0.93; this.gravity = 0.3;
        }
        draw() {
            ctx.globalAlpha = this.alpha;
            ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI*2); ctx.fill();
        }
        update() {
            this.vel.x *= this.friction; this.vel.y *= this.friction; this.vel.y += this.gravity;
            this.x += this.vel.x; this.y += this.vel.y; this.alpha -= 0.012;
        }
    }

    function spawnBurst() {
        const x = Math.random() * canvas.width;
        const y = Math.random() * (canvas.height * 0.7);
        const color = `hsl(${Math.random()*360}, 100%, 65%)`;
        for(let i=0; i<50; i++) fw_particles.push(new Particle(x, y, color));
    }

    function animate() {
        ctx.clearRect(0,0,750,400);
        if(isPartyMode && Math.random() < 0.2) spawnBurst();
        fw_particles.forEach((p, i) => {
            if(p.alpha <= 0) fw_particles.splice(i, 1);
            else { p.update(); p.draw(); }
        });
        requestAnimationFrame(animate);
    }
    animate();

    // CLOCK LOGIC
    function update() {
        if (isPartyMode) return;
        const now = new Date();
        let closest = { diff: Infinity, name: "" };

        locations.forEach(loc => {
            try {
                const formatter = new Intl.DateTimeFormat('en-US', {
                    timeZone: loc.tz, hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: false
                });
                const parts = formatter.formatToParts(now);
                const h = parseInt(parts.find(p => p.type === 'hour').value);
                const m = parseInt(parts.find(p => p.type === 'minute').value);
                const s = parseInt(parts.find(p => p.type === 'second').value);

                let target = new Date(now);
                target.setHours(16, 20, 0, 0); // 4:20 PM

                // Calculate time in that zone
                const locNow = new Date(now.toLocaleString("en-US", {timeZone: loc.tz}));
                if (locNow >= target) target.setDate(target.getDate() + 1);
                
                let diff = target - locNow;
                if (diff < closest.diff) closest = { diff: diff, name: loc.name };
            } catch(e) {}
        });

        const container = document.getElementById('overlay-container');
        if (closest.diff <= 1000) { triggerParty(); return; }

        // 60s Warning
        if (closest.diff < 60000) container.classList.add('is-warning');
        else container.classList.remove('is-warning');

        document.getElementById('hero-city').innerText = closest.name;
        document.getElementById('hero-timer').innerText = formatMs(closest.diff);
    }

    function formatMs(ms) {
        let totalSecs = Math.floor(ms / 1000);
        let h = Math.floor(totalSecs / 3600);
        let m = Math.floor((totalSecs % 3600) / 60);
        let s = totalSecs % 60;
        return h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function triggerParty() {
        isPartyMode = true;
        const container = document.getElementById('overlay-container');
        container.classList.add('party-mode');
        container.classList.remove('is-warning');
        document.getElementById('label-text').innerText = "IT'S 4:20 IN";
        document.getElementById('hero-timer').innerText = "HIGH TIME";
        document.getElementById('bottom-label-text').innerText = "CHEERS & BLAZE!!";
        
        setTimeout(() => {
            isPartyMode = false;
            container.classList.remove('party-mode');
            document.getElementById('label-text').innerText = "NEXT 4:20 IN:";
            document.getElementById('bottom-label-text').innerText = "Global Cannabis Clock";
            update();
        }, 30000);
    }

    setInterval(update, 1000);
    update();

    // SMOKE
    const smokeContainer = document.getElementById('smoke');
    for (let i = 0; i < 15; i++) {
        let p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.width = p.style.height = Math.random() * 100 + 40 + 'px';
        p.style.animationDelay = Math.random() * 2 + 's';
        smokeContainer.appendChild(p);
    }
</script>
</body>
</html>
