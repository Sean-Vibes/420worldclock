<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global 420 - NY Vibes Edition</title>
    <style>
        :root {
            --leaf: #4e9a06;
            --warning: #ff4444;
            --smoke: #f0f0f0;
            --glass: rgba(0, 0, 0, 0.85);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #111; 
            font-family: "Comic Sans MS", "Comic Sans", cursive, sans-serif;
            color: var(--smoke);
        }

        #fireworksCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .content-box {
            position: relative;
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 25px;
            border: 6px solid var(--leaf);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            width: 750px;
            height: 420px;
            margin: 40px auto;
            box-sizing: border-box;
            transition: all 0.5s ease;
            z-index: 10;
        }

        .corner-logo {
            position: absolute;
            bottom: 15px;
            left: 15px;
            width: 80px; 
            height: auto;
            filter: drop-shadow(0 0 5px var(--leaf));
        }

        .is-warning { border-color: var(--warning) !important; box-shadow: 0 0 35px rgba(255, 68, 68, 0.7); }
        .is-warning #hero-timer { color: var(--warning) !important; }

        .party-mode { animation: party-border 0.5s infinite alternate; }
        @keyframes party-border { from { border-color: var(--leaf); } to { border-color: #fff; box-shadow: 0 0 50px #fff; } }

        #hero-city { font-size: 3rem; margin: 10px 0; text-transform: uppercase; color: var(--leaf); }
        #hero-timer { font-size: 7rem; font-family: 'Courier New', monospace; margin: 10px 0; color: #fff; font-weight: bold; }
        .label-top { font-size: 1.8rem; color: #aaa; text-transform: uppercase; font-weight: bold; }

        .smoke-wrap { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 2; }
        .particle { position: absolute; bottom: -20px; background: rgba(255, 255, 255, 0.1); border-radius: 50%; filter: blur(15px); animation: rise 3s infinite ease-out; }
        @keyframes rise { 0% { transform: translateY(0) scale(1); opacity: 0; } 100% { transform: translateY(-400px) scale(4); opacity: 0; } }
    </style>
</head>
<body>

<canvas id="fireworksCanvas"></canvas>

<div class="content-box" id="overlay-container">
    <img src="NYS_420_logo.png" alt="Logo" class="corner-logo">
    <div class="smoke-wrap" id="smoke"></div>
    <span class="label-top" id="label-text">NEXT 4:20 IN:</span>
    <h1 id="hero-city">LOAD...</h1>
    <div id="hero-timer">00:00</div>
</div>

<script>
    // --- FIREWORKS ---
    const canvas = document.getElementById('fireworksCanvas');
    const ctx = canvas.getContext('2d');
    let fParticles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    function createExplosion(x, y) {
        const hue = Math.random() * 360;
        for(let i=0; i<40; i++){
            fParticles.push({
                x, y, 
                vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12,
                alpha: 1, hue
            });
        }
    }

    function drawFireworks() {
        ctx.fillStyle = 'rgba(17, 17, 17, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        if(isPartyMode && Math.random() < 0.15) createExplosion(Math.random()*canvas.width, Math.random()*canvas.height);
        fParticles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.alpha -= 0.02;
            ctx.fillStyle = `hsl(${p.hue}, 100%, 50%, ${p.alpha})`;
            ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, 7); ctx.fill();
            if(p.alpha <= 0) fParticles.splice(i, 1);
        });
        requestAnimationFrame(drawFireworks);
    }
    drawFireworks();

    // --- LOGIC ---
    const locations = [
        { name: "London", tz: "Europe/London" },
        { name: "New York", tz: "America/New_York" },
        { name: "Los Angeles", tz: "America/Los_Angeles" },
        { name: "Tokyo", tz: "Asia/Tokyo" },
        { name: "Sydney", tz: "Australia/Sydney" },
        { name: "Denver", tz: "America/Denver" }
    ];

    let isPartyMode = false;
    let alarmPlayed = false;
    const haloAlarm = new Audio("https://www.myinstants.com/media/sounds/halo-reach-1-minute-remain-33548.mp3");

    function getDiff(tz) {
        try {
            // Get current time in city
            const now = new Date();
            const cityStr = now.toLocaleString("en-US", { timeZone: tz });
            const cityDate = new Date(cityStr);

            // Targets: 4:20 AM and 4:20 PM
            const targets = [4, 16].map(h => {
                let t = new Date(cityStr);
                t.setHours(h, 20, 0, 0);
                if (cityDate >= t) t.setHours(t.getHours() + 12); // Next 12 hour cycle
                return t;
            });

            // Find the closest one
            const diffs = targets.map(t => t.getTime() - cityDate.getTime());
            return Math.min(...diffs);
        } catch(e) { return Infinity; }
    }

    function main() {
        if(isPartyMode) return;

        let best = { diff: Infinity, name: "" };
        locations.forEach(l => {
            const d = getDiff(l.tz);
            if(d < best.diff) best = { diff: d, name: l.name };
        });

        const sec = Math.floor(best.diff / 1000);
        
        // Audio
        if(sec === 60 && !alarmPlayed) { 
            haloAlarm.play().catch(() => {}); 
            alarmPlayed = true; 
        }
        if(sec < 55) alarmPlayed = false;

        // Party
        if(best.diff <= 1000) { triggerParty(); return; }

        // UI
        document.getElementById('hero-city').innerText = best.name;
        const container = document.getElementById('overlay-container');
        if(sec < 60) container.classList.add('is-warning'); else container.classList.remove('is-warning');

        const h = Math.floor(sec / 3600);
        const m = Math.floor((sec % 3600) / 60);
        const s = sec % 60;
        document.getElementById('hero-timer').innerText = h > 0 ? 
            `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` : 
            `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function triggerParty() {
        isPartyMode = true;
        const container = document.getElementById('overlay-container');
        container.classList.add('party-mode');
        document.getElementById('label-text').innerText = "IT'S 4:20 IN";
        document.getElementById('hero-timer').innerText = "HIGH TIME";
        setTimeout(() => {
            isPartyMode = false;
            container.classList.remove('party-mode');
            document.getElementById('label-text').innerText = "NEXT 4:20 IN:";
            main();
        }, 20000);
    }

    setInterval(main, 1000);
    main();

    // Smoke
    const smokeContainer = document.getElementById('smoke');
    for (let i = 0; i < 12; i++) {
        let p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.width = p.style.height = (Math.random() * 60 + 40) + 'px';
        p.style.animationDelay = (Math.random() * 3) + 's';
        smokeContainer.appendChild(p);
    }
</script>
</body>
</html>
