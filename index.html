<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global 420 - NY Vibes Edition</title>
    <style>
        :root {
            --leaf: #4e9a06;
            --warning: #ff4444;
            --smoke: #f0f0f0;
            --glass: rgba(0, 0, 0, 0.85);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #111; 
            font-family: "Comic Sans MS", "Comic Sans", cursive, sans-serif;
            color: var(--smoke);
        }

        /* The Canvas for Fireworks */
        #fireworksCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1; /* Behind the clock, in front of the background */
        }

        .content-box {
            position: relative;
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 25px;
            border: 6px solid var(--leaf);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            width: 750px;
            height: 420px;
            margin: 20px auto;
            box-sizing: border-box;
            transition: all 0.5s ease;
            overflow: hidden;
            z-index: 10; /* Keep clock on top */
        }

        .corner-logo {
            position: absolute;
            bottom: 12px;
            left: 15px;
            width: 70px; 
            height: auto;
            z-index: 20;
            filter: drop-shadow(0 0 5px rgba(78, 154, 6, 0.5));
        }

        .is-warning { border-color: var(--warning) !important; box-shadow: 0 0 35px rgba(255, 68, 68, 0.7); }
        .is-warning #hero-timer { color: var(--warning) !important; animation: fast-pulse 0.5s infinite alternate; }
        @keyframes fast-pulse { from { transform: scale(1); } to { transform: scale(1.05); } }

        /* Party Mode Border Pulse */
        .party-mode { animation: party-border 0.5s infinite alternate; }
        @keyframes party-border {
            from { border-color: var(--leaf); }
            to { border-color: #fff; box-shadow: 0 0 50px #fff; }
        }

        #hero-city { font-size: 2.8rem; margin: 10px 0; text-transform: uppercase; font-weight: 900; color: var(--leaf); letter-spacing: 2px; }
        #hero-timer { font-size: 6rem; font-family: 'Courier New', monospace; margin: 10px 0; color: #fff; font-weight: bold; }
        .label-top { font-size: 1.8rem; letter-spacing: 4px; color: #aaa; text-transform: uppercase; font-weight: bold; }
        .bottom-label { font-size: 1.6rem; color: var(--leaf); margin-top: 5px; font-weight: bold; }

        .smoke-wrap { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 2; }
        .particle { position: absolute; bottom: -20px; background: rgba(255, 255, 255, 0.1); border-radius: 50%; filter: blur(15px); animation: rise 3s infinite ease-out; }
        @keyframes rise { 0% { transform: translateY(0) scale(1); opacity: 0; } 50% { opacity: 0.2; } 100% { transform: translateY(-300px) scale(4); opacity: 0; } }
    </style>
</head>
<body>

    <canvas id="fireworksCanvas"></canvas>

    <div class="content-box" id="overlay-container">
        <img src="NYS_420_logo.png" alt="NY 420 Vibes" class="corner-logo">
        <div class="smoke-wrap" id="smoke"></div>
        <span class="label-top" id="label-text">NEXT 4:20 IN:</span>
        <h1 id="hero-city">SYNCING...</h1>
        <div id="hero-timer">00:00</div>
        <div class="bottom-label" id="bottom-label-text">Global Cannabis Clock</div>
    </div>

<script>
    // --- FIREWORKS ENGINE ---
    const canvas = document.getElementById('fireworksCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let fireworks = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Firework {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = canvas.height;
            this.targetY = Math.random() * (canvas.height / 2);
            this.speed = 4 + Math.random() * 3;
            this.angle = Math.atan2(this.targetY - this.y, 0);
            this.hue = Math.random() * 360;
        }
        update() {
            this.y -= this.speed;
            if (this.y <= this.targetY) {
                explode(this.x, this.y, this.hue);
                return true;
            }
            return false;
        }
        draw() {
            ctx.fillStyle = `hsl(${this.hue}, 100%, 50%)`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    class Particle {
        constructor(x, y, hue) {
            this.x = x; this.y = y;
            this.hue = hue;
            this.gravity = 0.1;
            this.friction = 0.95;
            this.velocity = {
                x: (Math.random() - 0.5) * 10,
                y: (Math.random() - 0.5) * 10
            };
            this.alpha = 1;
            this.decay = 0.01 + Math.random() * 0.02;
        }
        update() {
            this.velocity.x *= this.friction;
            this.velocity.y *= this.friction;
            this.velocity.y += this.gravity;
            this.x += this.velocity.x;
            this.y += this.velocity.y;
            this.alpha -= this.decay;
        }
        draw() {
            ctx.globalAlpha = this.alpha;
            ctx.fillStyle = `hsl(${this.hue}, 100%, 50%)`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function explode(x, y, hue) {
        for (let i = 0; i < 50; i++) {
            particles.push(new Particle(x, y, hue));
        }
    }

    function animateFireworks() {
        ctx.fillStyle = 'rgba(17, 17, 17, 0.2)'; // Trails
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        if (isPartyMode && Math.random() < 0.1) {
            fireworks.push(new Firework());
        }

        fireworks = fireworks.filter(f => {
            f.update();
            f.draw();
            return f.y > f.targetY;
        });

        particles = particles.filter(p => {
            p.update();
            p.draw();
            return p.alpha > 0;
        });

        requestAnimationFrame(animateFireworks);
    }
    animateFireworks();

    // --- CLOCK LOGIC ---
    const locations = [
        { name: "New York", tz: "America/New_York" },
        { name: "London", tz: "Europe/London" },
        { name: "Tokyo", tz: "Asia/Tokyo" },
        { name: "Los Angeles", tz: "America/Los_Angeles" },
        { name: "Sydney", tz: "Australia/Sydney" }
        // ... (Add your other locations here)
    ];

    let isPartyMode = false;
    let alarmPlayed = false;
    const haloAlarm = new Audio("https://www.myinstants.com/media/sounds/halo-reach-1-minute-remain-33548.mp3");

    function getNext420(tz) {
        const now = new Date();
        const zoneTime = new Date(now.toLocaleString("en-US", { timeZone: tz }));
        let targets = [
            new Date(zoneTime), new Date(zoneTime), new Date(zoneTime)
        ];
        targets[0].setHours(4, 20, 0, 0);
        targets[1].setHours(16, 20, 0, 0);
        targets[2].setDate(targets[2].getDate() + 1);
        targets[2].setHours(4, 20, 0, 0);

        for (let t of targets) {
            let diff = t - zoneTime;
            if (diff > 0) return diff;
        }
        return 86400000;
    }

    function update() {
        if (isPartyMode) return;
        
        let closest = { diff: Infinity, name: "" };
        locations.forEach(loc => {
            let diff = getNext420(loc.tz);
            if (diff < closest.diff) closest = { diff: diff, name: loc.name };
        });

        let secRem = Math.floor(closest.diff / 1000);

        if (secRem === 60 && !alarmPlayed) {
            haloAlarm.play().catch(() => {});
            alarmPlayed = true;
        }
        if (secRem < 55 || secRem > 65) alarmPlayed = false;

        if (closest.diff <= 1000) { triggerParty(); return; }

        const container = document.getElementById('overlay-container');
        if (closest.diff < 60000) container.classList.add('is-warning');
        else container.classList.remove('is-warning');

        document.getElementById('hero-city').innerText = closest.name;
        
        let h = Math.floor(secRem / 3600);
        let m = Math.floor((secRem % 3600) / 60);
        let s = secRem % 60;
        document.getElementById('hero-timer').innerText = h > 0 ? 
            `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` : 
            `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function triggerParty() {
        isPartyMode = true;
        const container = document.getElementById('overlay-container');
        container.classList.add('party-mode');
        document.getElementById('label-text').innerText = "IT'S 4:20 IN";
        document.getElementById('hero-timer').innerText = "HIGH TIME";
        
        setTimeout(() => {
            isPartyMode = false;
            container.classList.remove('party-mode');
            document.getElementById('label-text').innerText = "NEXT 4:20 IN:";
            update();
        }, 30000);
    }

    setInterval(update, 1000);
    update();

    // Smoke Particles
    const smokeContainer = document.getElementById('smoke');
    for (let i = 0; i < 15; i++) {
        let p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.width = p.style.height = (Math.random() * 50 + 40) + 'px';
        p.style.animationDelay = (Math.random() * 3) + 's';
        smokeContainer.appendChild(p);
    }
</script>
</body>
</html>
